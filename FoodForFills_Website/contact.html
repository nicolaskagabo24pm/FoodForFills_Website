<section class="contact">
    <div class="content">
        <h2>Contact Us</h2>
    </div>
    
    <div class="contact-container">

        <!-- LEFT SIDE -->
        <div class="contactInfo">
            <div class="box">
                <div class="icon"><i class="fa fa-map-marker-alt"></i></div>
                <div class="text">
                    <h3>Address</h3>
                    <p>Umucyo Estate,<br>
                    Gacuriro, Kigali,<br>
                    KG 428 st 12</p>
                </div>
            </div>

            <div class="box">
                <div class="icon"><i class="fa fa-phone"></i></div>
                <div class="text">
                    <h3>Phone</h3>
                    <p>0782 762 217</p>
                </div>
            </div>

            <div class="box">
                <div class="icon"><i class="fa fa-envelope"></i></div>
                <div class="text">
                    <h3>Email</h3>
                    <p>info@foodforfills.com</p>
                </div>
            </div>

        </div>

        <!-- RIGHT SIDE -->
        <div class="contactForm">
            <form>
                <h2>Send Message</h2>

                <div class="inputBox">
                    <input type="text" required>
                    <span>Full Name</span>
                </div>

                <div class="inputBox">
                    <input type="email" required>
                    <span>Email</span>
                </div>

                <div class="inputBox">
                    <textarea required></textarea>
                    <span>Type your Message...</span>
                </div>

                <div class="inputBox">
                    <input type="submit" value="Send">
                </div>

            </form>
        </div>
    </div>
</section>

<footer>
<p>© 2026 Food For Fills</p>
</footer>

</body>
